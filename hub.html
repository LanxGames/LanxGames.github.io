<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Null Whisper</title>

<style>
body {
  margin: 0;
  background: #0B0B0F;
  color: white;
  font-family: monospace;
  overflow: hidden;
}

.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.hidden { opacity: 0; transition: 1s; }
.show { opacity: 1; }

.glitch {
  font-size: 3rem;
  color: #FF003C;
  animation: flicker 2s infinite;
}

@keyframes flicker {
  0%,100% {opacity:1;}
  50% {opacity:0.5;}
}

button {
  padding: 10px 20px;
  border: 1px solid #FF003C;
  background: transparent;
  color: #FF003C;
  cursor: pointer;
}

input {
  padding: 8px;
  margin-top: 10px;
  background: black;
  border: 1px solid #6A00FF;
  color: white;
}

/* LEVEL 2 hidden word */
#hiddenWord {
  position: absolute;
  bottom: 10%;
  right: 10%;
  color: #0B0B0F;
  cursor: pointer;
}

/* LEVEL 3 takeover */
#system {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  color: #00FF00;
  font-family: monospace;
  display: none;
  padding: 20px;
}

</style>
</head>

<body>

<div class="container" id="main">
  <div class="glitch">NULL WHISPER</div>
  <p id="text">...something is watching...</p>

  <button onclick="start()">ENTER</button>

  <!-- LEVEL 1 -->
  <div id="level1" class="hidden">
    <p>Enter the code:</p>
    <input id="codeInput">
  </div>

  <!-- LEVEL 2 -->
  <div id="level2" class="hidden">
    <p>Find the hidden word...</p>
    <div id="hiddenWord" onclick="nextLevel()">void</div>
  </div>

  <!-- FINAL -->
  <div id="final" class="hidden">
    <h2>YOU ARE INSIDE</h2>
  </div>
</div>

<!-- SYSTEM SCREEN -->
<div id="system"></div>

<script>
let level = 0;

/* START */
function start() {
  document.getElementById("level1").classList.add("show");
}

/* LEVEL 1 CODE */
document.getElementById("codeInput").addEventListener("input", function() {
  if (this.value.toLowerCase() === "loop") {
    nextLevel();
  }
});

/* NEXT LEVEL */
function nextLevel() {
  level++;

  if (level === 1) {
    document.getElementById("level1").classList.remove("show");
    document.getElementById("level2").classList.add("show");
  }

  else if (level === 2) {
    document.getElementById("level2").classList.remove("show");
    startSystem();
  }

  else if (level === 3) {
    document.getElementById("final").classList.add("show");
  }
}

/* LEVEL 3 SYSTEM TAKEOVER */
function startSystem() {
  const sys = document.getElementById("system");
  sys.style.display = "block";

  let lines = [
    "Initializing...",
    "Accessing user data...",
    "ERROR: Unknown presence detected",
    "Trying to escape...",
    "FAILED",
    "YOU ARE NOT ALONE",
    "SYSTEM LOCKED"
  ];

  let i = 0;
  let interval = setInterval(() => {
    sys.innerHTML += lines[i] + "<br>";
    i++;

    if (i >= lines.length) {
      clearInterval(interval);
      setTimeout(() => {
        sys.style.display = "none";
        nextLevel();
      }, 2000);
    }
  }, 800);
}
</script>

</body>
</html>
